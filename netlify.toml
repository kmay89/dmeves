# dmeves.com — static site, no build step
[build]
  publish = "."

# Canonical host: send www (http and https) to the apex domain in one hop
[[redirects]]
  from = "http://www.dmeves.com/*"
  to = "https://dmeves.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.dmeves.com/*"
  to = "https://dmeves.com/:splat"
  status = 301
  force = true

# Security headers for every page
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

# Self-hosted fonts never change; cache them hard
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# The social preview image rarely changes; let it cache hard
[[headers]]
  for = "/og-image.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"
